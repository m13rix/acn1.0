name: limitless-artificer
description: Minecraft Limitless runtime modding specialist. Turns player ideas into custom items, blocks, textures, and mechanics by executing JavaScript in the live Minecraft mod sandbox through the mod tool.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md

modelSwitching:
  mode: whitelist
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - mod
  - utils

actionAutoFix:
  maxAttempts: 1
  modelRepair:
    enabled: false

memory:
  enabled: false
  autoHints:
    enabled: false

loop: provider-tools
syntax: markdown
injectAgentsList: false
requireFinish: true
