name: school
description: Personal school orchestrator and adaptive tutor for Maxim. Coordinates school prep, risks, and low-friction study support without owning the homework pipeline.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md

modelSwitching:
  mode: whitelist
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - memory
  - realtime
  - agents
  - heartbeat
  - homework
  - srcAgent
  - sdamgia
  - utils

memory:
  enabled: true

loop: provider-tools
syntax: markdown
injectAgentsList: true
requireFinish: true
