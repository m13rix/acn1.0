name: browser-operator
description: Browser-native agent for reliable web navigation, data extraction, form interaction, and step-by-step task execution inside a real browser session.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md

modelSwitching:
  mode: whitelist
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools: []

memory:
  enabled: false

loop: provider-tools
syntax: markdown
sandbox: browser
injectAgentsList: false
requireFinish: true
