name: CORE
description: The primary and base agent.

model: deepseek/deepseek-v4-flash
provider: openrouter
systemPrompt: prompts/system.md

modelSwitching:
  mode: whitelist
  whitelist:
    - deepseek/deepseek-v4-flash
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - memory
  - agents
  - heartbeat
  - googleCalendar
  - homework
  - utils

memoryToolDocs: true

memory:
  enabled: true

  memoryToolDocs: true

  autoHints:
    enabled: true
    toolResponses:
      enabled: false
    userPhraseWeighting: "llm"

  categories:
    - name: core_prompt_v1

  includeUncategorized: false
  fallbackCategory: core

  searchMaxChains: 8

adaptiveStepContext:
  enabled: true
  pruning:
    enabled: true
    heatThreshold: 0.6
  debug:
    enabled: true
    port: 3067
    openBrowser: true

injectAgentsList: true
requireFinish: false
