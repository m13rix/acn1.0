name: CORE
description: The primary and base agent.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md

modelSwitching:
  mode: whitelist
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - notepad
  - realtime
  - agents
  - srcAgent
  - heartbeat
  - strategy
  - homework
  - utils

memory:
  enabled: false

loop: provider-tools
syntax: markdown
skillsTable: test
injectAgentsList: true
requireFinish: true # Set to false to disable mandatory FINISH command

