name: test-agent
description: A test agent for development and testing the framework (Planner/Executor)

planner:
  model: deepseek/deepseek-v3.2
  provider: openrouter
  systemPrompt: prompts/planner.md

executor:
  model: deepseek/deepseek-v3.2
  provider: openrouter
  systemPrompt: prompts/executor.md
  modelSwitching:
    whitelist:
      - deepseek/deepseek-v3.2
      - xiaomi/mimo-v2-flash
    selector:
      model: openai/gpt-oss-20b
      provider: openrouter

tools:
  - search

loop: message-passthrough
syntax: xml-tags

