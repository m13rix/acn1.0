name: base_strategist
description: Main recursive strategy-design agent for the Telos Ultimate Strategy Engine. Builds intake and goal files, explores route trees, evaluates branches, and synthesizes the final strategy.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md
subagentPrompt: prompts/subagent.md

modelSwitching:
  mode: whitelist
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - agents
  - strategy
  - utils
  - minecraft
  - memory

memory:
  enabled: false

loop: provider-tools
syntax: markdown
skillsTable: strategy_base_strategist
injectAgentsList: true
requireFinish: true
