name: base_probabilist
description: Optional world-branch analysis specialist for the Telos Ultimate Strategy Engine. Evaluates a specific route or scenario when probability/utility modeling is needed.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md
subagentPrompt: prompts/subagent.md

modelSwitching:
  mode: whitelist
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - agents
  - strategy
  - utils
  - memory

memory:
  enabled: true

loop: provider-tools
syntax: markdown
injectAgentsList: true
requireFinish: true
