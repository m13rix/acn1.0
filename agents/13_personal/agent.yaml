name: 13_personal
description: The personal conversational and support agent for the subject 13 with a 'soul'.

model: moonshotai/kimi-k2.5
provider: openrouter
systemPrompt: prompts/system.md
runPath: ./

modelSwitching:
  whitelist:
    - deepseek/deepseek-v3.2
    - minimax/minimax-m2.7
    - moonshotai/kimi-k2.5
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - memory
  - heartbeat
  - googleCalendar
  - agents
  - utils

injectAgentsList: true
requireFinish: false
preserveSession: true
requireFinishHeartbeat: true

memory:
  enabled: true

loop: provider-tools
syntax: markdown
