name: analyzer
description: Super-human analytical agent. Deconstructs data using structured Tree-of-Thought reasoning, Bayesian updating, and detective-level deduction to extract maximum truth from minimum information.

model: moonshotai/kimi-k2.5
provider: openrouter
systemPrompt: prompts/system.md
subagentPrompt: prompts/subagent.md

modelSwitching:
  mode: whitelist
  whitelist:
    - moonshotai/kimi-k2.5
    - minimax/minimax-m2.5
    - deepseek/deepseek-v3.2
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - agents

memory:
  enabled: true

loop: provider-tools
syntax: markdown
skillsTable: analyzer_skills
injectAgentsList: true
requireFinish: false
