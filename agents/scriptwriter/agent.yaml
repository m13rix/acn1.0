name: scriptwriter
description: Creates high-quality video scripts for educational documentaries (Remotion-based). Outputs structured shot-by-shot scenarios.

model: moonshotai/kimi-k2.5
provider: openrouter
systemPrompt: prompts/system.md
subagentPrompt: prompts/subagent.md

modelSwitching:
  mode: whitelist
  whitelist:
    - x-ai/grok-4.1-fast
    - deepseek/deepseek-v3.2
    - minimax/minimax-m2.5
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - utils

memory:
  enabled: false

loop: provider-tools
syntax: markdown
skillsTable: scriptwriter
injectAgentsList: false
requireFinish: true

