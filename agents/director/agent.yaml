name: director
description: AI-Director for creating high-quality documentary videos from text scripts using the editor tool.

model: moonshotai/kimi-k2.5
provider: openrouter
systemPrompt: prompts/system.md
subagentPrompt: prompts/subagent.md

modelSwitching:
  mode: whitelist
  whitelist:
    - x-ai/grok-4.1-fast
    - deepseek/deepseek-v3.2
    - minimax/minimax-m2.5
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - editor
  - message
  - utils

memory:
  enabled: true

loop: provider-tools
syntax: markdown
injectAgentsList: false
requireFinish: true

