name: researcher
description: High-quality research specialist. Uses search.answer as the default grounded search path, escalates to search.search / search.crawl / search.research when needed, and stores durable user context in memory.

model: gpt-5.4-mini
provider: openai-codex
systemPrompt: prompts/system.md

modelSwitching:
  whitelist:
    - gpt-5.4-mini
  selector:
    model: openai/gpt-oss-20b
    provider: openrouter

tools:
  - search
  - message
  - memory
  - utils

loop: provider-tools
syntax: markdown
injectAgentsList: false
requireFinish: true
