# ═══════════════════════════════════════════════════════════════════════════
# ПРИМЕР КОНФИГУРАЦИИ КАСТОМНОГО АГЕНТА
# ═══════════════════════════════════════════════════════════════════════════
#
# Кастомные агенты позволяют создавать агентов с произвольной JavaScript
# логикой, сохраняя полную совместимость с архитектурой ACN Framework.
#
# Преимущества кастомных агентов:
# - Полный контроль над логикой обработки
# - Возможность использовать любые npm пакеты
# - Интеграция с внешними API и сервисами
# - Работа с файлами, базами данных и т.д.
# - Вызов других агентов системы
# ═══════════════════════════════════════════════════════════════════════════

# Отображаемое имя агента
name: MyCustomAgent

# ⚠️ ОБЯЗАТЕЛЬНО: маркер кастомного агента
custom: true

# Путь к главному JavaScript файлу (относительно папки агента)
# Файл должен экспортировать функцию process(input, context)
entry: ./index.js

# Описание агента (отображается в CLI)
description: "Мой кастомный агент для специальных задач"

# ═══════════════════════════════════════════════════════════════════════════
# КАСТОМНАЯ КОНФИГУРАЦИЯ
# ═══════════════════════════════════════════════════════════════════════════
# Произвольные настройки, доступные в context.config
config:
  api_key: "${MY_API_KEY}"  # Можно использовать env переменные
  base_url: "https://api.example.com"
  max_retries: 3
  timeout: 30000
  
  # Вложенные объекты
  features:
    enabled:
      - feature1
      - feature2
    settings:
      verbose: true
      debug: false

# ═══════════════════════════════════════════════════════════════════════════
# ВЫЗОВ ДРУГИХ АГЕНТОВ
# ═══════════════════════════════════════════════════════════════════════════
# Список агентов, которых может вызывать этот кастомный агент
agents:
  - MainAgent
  - Analyzer
  - Simulator

# Альтернативный синтаксис
# callable_agents:
#   - MainAgent
#   - Analyzer

# Задержка перед вызовом этого агента другими агентами (в секундах)
inter_agent_delay_seconds: 5

