name: Tutor
planner:
  provider: gemini
  model: models/gemini-flash-latest
  system_prompt_file: planner_system.txt
  temperature: 1
executor:
  provider: gemini
  model: models/gemini-flash-latest
  system_prompt_file: executor_system.txt
  temperature: 1
  model_switching:
    mode: whitelist
    whitelist: ["google/gemini-2.5-flash", "openai/gpt-oss-120b", "google/gemini-2.5-pro"]
    selector:
      provider: cerebras
      model: gpt-oss-120b
tools:
  - search
  - memory
inter_agent_delay_seconds: 60

# === ЭКСПЕРИМЕНТАЛЬНЫЕ ФУНКЦИИ ===
experimental:
  # Gemini File Search - загрузка документов из ./context для RAG
  # Модели gemini автоматически получат доступ к этим документам
  gemini_file_search:
    enabled: false  # Установите true для включения
