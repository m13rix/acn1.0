# ═══════════════════════════════════════════════════════════════════════════
# PDF Visual Debugger - Кастомный агент для визуальной отладки PDF страниц
# ═══════════════════════════════════════════════════════════════════════════
#
# Этот агент использует Gemini Vision для итеративного улучшения
# визуального оформления HTML страниц, которые конвертируются в PDF.
#
# Рабочий процесс:
# 1. Загружает HTML код указанной страницы
# 2. Рендерит страницу в Puppeteer с точными размерами PDF (1247x882)
# 3. Делает скриншот и отправляет Gemini с заданием
# 4. Gemini либо выдаёт исправленный HTML, либо "done"
# 5. Цикл повторяется до завершения
# ═══════════════════════════════════════════════════════════════════════════

name: PDFVisualDebugger

custom: true
entry: ./index.js

description: "Визуальная отладка PDF страниц с помощью Gemini Vision"

# ═══════════════════════════════════════════════════════════════════════════
# КОНФИГУРАЦИЯ
# ═══════════════════════════════════════════════════════════════════════════
config:
  # Номер страницы для отладки (0-based, соответствует page0.html, page1.html, ...)
  pageNumber: 8

  # Путь к папке с данными pdfGen (относительно корня проекта)
  dataPath: "tools/pdfGen/data"

  # Размеры PDF viewport (точные размеры A4 landscape)
  viewport:
    width: 1247
    height: 882

  # Настройки Gemini
  gemini:
    model: "models/gemini-flash-latest"
    temperature: 1
    maxIterations: 10  # Максимум итераций для безопасности

  # Автоматически сохранять скриншоты каждой итерации
  saveScreenshots: true
  screenshotsDir: "debug_screenshots"

inter_agent_delay_seconds: 5

