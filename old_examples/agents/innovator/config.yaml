name: Innovator
planner:
  provider: gemini
  model: models/gemini-2.5-pro
  system_prompt_file: planner_system.txt
  temperature: 1
executor:
  provider: gemini
  model: models/gemini-flash-latest
  system_prompt_file: executor_system.txt
  temperature: 1
  model_switching:
    mode: whitelist
    whitelist: ["google/gemini-2.5-flash", "openai/gpt-oss-120b", "google/gemini-2.5-pro"]
    selector:
      provider: cerebras
      model: zai-glm-4.6
tools:
  - memory
  - search
  - computerUse
  - ui
agents:
  - ValuesCheck
inter_agent_delay_seconds: 60
