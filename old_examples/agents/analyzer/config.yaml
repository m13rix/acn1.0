name: Analyzer
planner:
  provider: openrouter
  model: deepseek/deepseek-v3.2
  system_prompt_file: planner_system.txt
  temperature: 1
executor:
  provider: openrouter
  model: deepseek/deepseek-v3.2
  system_prompt_file: executor_system.txt
  temperature: 1
  model_switching:
    mode: whitelist
    whitelist: ["deepseek/deepseek-v3.2", "moonshotai/kimi-k2-thinking"]
    selector:
      provider: cerebras
      model: gpt-oss-120b
tools:
  - memory
  - search
  - computerUse
  - ui
inter_agent_delay_seconds: 60
