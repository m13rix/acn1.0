name: MainAgent
planner:
  provider: gemini
  model: models/gemini-flash-latest
  system_prompt_file: planner_system.txt
  temperature: 1
executor:
  provider: gemini
  model: models/gemini-flash-latest
  system_prompt_file: executor_system.txt
  temperature: 1
  model_switching:
    enabled: true
    mode: whitelist
    whitelist:
      - models/gemini-flash-latest
      - gpt-oss-120b
      - gpt-5
    default_model: models/gemini-flash-latest
    top_k: 5
    registry_path: data/models/models.json
    embedding_index_path: data/models/embeddings.json
    selector:
      provider: cerebras
      model: gpt-oss-120b
    overrides:
      gpt-5:
        temperature: 0.6
      gpt-oss-120b:
        temperature: 0.9
tools:
  - memory
agents:
  - Analyzer
  - Simulator
  - ValuesCheck
  - ActionAgent
  - Manipulator
inter_agent_delay_seconds: 60
