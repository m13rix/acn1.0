name: ResearchAgent
planner:
  provider: openrouter
  model: alibaba/tongyi-deepresearch-30b-a3b:free
  system_prompt_file: planner_system.txt
  temperature: 0.6
executor:
  provider: openrouter
  model: alibaba/tongyi-deepresearch-30b-a3b
  system_prompt_file: executor_system.txt
  temperature: 0.6
  model_switching:
    mode: whitelist
    whitelist: ["alibaba/tongyi-deepresearch-30b-a3b"]
    selector:
      provider: openrouter
      model: openai/gpt-oss-20b
tools:
  - exa
inter_agent_delay_seconds: 3

# === ЭКСПЕРИМЕНТАЛЬНЫЕ ФУНКЦИИ ===
experimental:
  # Gemini File Search - загрузка документов из ./context для RAG
  # Модели gemini автоматически получат доступ к этим документам
  gemini_file_search:
    enabled: false  # Установите true для включения
