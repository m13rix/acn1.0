name: files
description: |
  - `files.View(filePaths: string[]): Promise<{ success: boolean; filesRead: number; errors?: string[] }>`
    ALWAYS USE THIS TYPESCRIPT FUNCTION to view files from the sandbox directory. Supports images, PDFs, videos, and other file types.
    Example: `const result = await files.View(["./document.pdf", "./image.jpg"]);`

module: index.ts
