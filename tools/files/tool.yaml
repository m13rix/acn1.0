name: files
description: |
  - `files.View(filePaths: string[]): Promise<{ success: boolean; filesRead: number; errors?: string[] }>`
    Read files from the sandbox directory and add them to context as file messages. Files are read as base64 and added to the conversation context. Supports images, PDFs, videos, and other file types that the model supports.
    Example: `const result = await files.View(["./document.pdf", "./image.jpg"]);`

module: index.ts
