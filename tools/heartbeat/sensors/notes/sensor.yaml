name: notes
description: >
  Google Keep heartbeat sensor for rich note-ingest events.
events:
  - name: newNote
    description: Fires when a newly created or updated user-owned Google Keep note is detected.
    argsSchema:
      type: array
      items: []
      minItems: 0
      maxItems: 0
    payloadSchema:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        title:
          type: string
        logicalTitle:
          type: string
        rawTitle:
          type: string
        owner:
          type: string
        kind:
          type: string
        text:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
              text:
                type: string
              checked:
                type: boolean
              sort:
                type:
                  - number
                  - 'null'
            required:
              - id
              - text
              - checked
              - sort
        createdAt:
          type:
            - string
            - 'null'
        modifiedAt:
          type:
            - string
            - 'null'
      required:
        - id
        - title
        - logicalTitle
        - rawTitle
        - owner
        - kind
        - text
        - items
        - createdAt
        - modifiedAt
