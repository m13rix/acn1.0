name: heartbeat
description: |
  Persistent event bindings and structured sensors.
  API:
  - heartbeat.bind(eventRef, handler, options?) -> BindingRecord
  - heartbeat.bindings.list(query?) -> BindingRecord[]
  - heartbeat.bindings.get(id, query?) -> BindingRecord | null
  - heartbeat.bindings.unbind(id) -> { ok: true }
  - heartbeat.bindings.rebind(id, patch) -> BindingRecord
  - heartbeat.sensors.list() -> SensorDescriptor[]
  - heartbeat.sensors.<sensor>.events.<event>(...args) -> HeartbeatEventRef
  - heartbeat.sensors.<sensor>.ask(prompt, schema, imagePath?) -> structured JSON
  - heartbeat.sensors.create(prompt) -> scaffold a new V2 sensor
