name: context
description: |
  Fast context helpers for small, speed-focused agents.

  `context.web(query, options?): Promise<string>`
  - Fast web search.
  - options: { maxResults?, timeoutMs?, freshness? }
  - freshness can be Serper's `tbs` value, for example `qdr:d` for past day.

  `context.weather(location, options?): Promise<string>`
  - Fast current weather for a city/place.
  - Geocodes the location, then returns compact current conditions.
  - `date` can be omitted for current conditions, or set to `'today'`, `'tomorrow'`, or an ISO date like `2026-06-04`.
  - options: { temperatureUnit?, windSpeedUnit?, timeoutMs?, date? }
  - temperatureUnit: 'celsius' | 'fahrenheit'
  - windSpeedUnit: 'kmh' | 'ms' | 'mph' | 'kn'

module: index.ts
