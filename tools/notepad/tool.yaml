name: notepad
description: |
  Shared persistent notes for all agents in the system.

  - `notepad.listNotes(): Promise<string[]>`
    Returns all note titles.

  - `notepad.addNote(title: string, content: string): Promise<string>`
    Creates a new note with the given title.
    Throws an error if a note with that title already exists.

  - `notepad.viewNote(title: string): Promise<string>`
    Returns the full content of the note.

  - `notepad.editNote(title: string, search: string, replace: string): Promise<string>`
    Edits a note using separate `search` and `replace` string arguments.
    Use escaped `\n` when you need newlines inside search or replace text.
    The search text must match exactly once.
module: index.ts
