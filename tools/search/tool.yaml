name: search
description: |
  Web search, deep research, plus image search.

  `search.answer(...)` is the main way to search.
  Use it by default when you want the most useful grounded result, because it returns a synthesized answer plus sources.

  search.answer(query, options?): { answer, sources? }
  - Main search path
  - options: { topic?, searchDepth?, maxResults?, output? }
  - topic: 'general' | 'news' | 'finance'
  - searchDepth: 'basic' | 'advanced' | 'fast' | 'ultra-fast' (default: 'advanced', recommended)
  - output:
    - 'answer' -> only the answer
    - 'answerAndUrls' -> answer plus source URLs (default)
    - 'answerAndSources' -> answer plus full source objects

  search.search(query, options?): string[] | SearchResult[]
  - Normal search without synthesized answer
  - options: { topic?, searchDepth?, maxResults?, output? }
  - output:
    - 'urls' -> only URLs (default)
    - 'full' -> normal Tavily result objects with title, url, content, score, publishedDate?, favicon? (no rawContent)

  search.crawl(url, prompt): { baseUrl, results[] }
  - Most useful and usually the slowest search function
  - Use when the model has a starting URL and a focused request
  - Crawls the page and relevant subpages automatically
  - No optional arguments; defaults are built in
  - Returns: { baseUrl, results: [{ url, rawContent, favicon? }] }
  - Large raw page bodies may be intelligently truncated to keep observations usable

  search.imageSearch(query, options?): ImageSearchResult[] - the only way to SEARCH FOR IMAGES
  - Search for images using Tavily (`includeImages: true`)
  - options: { limit?, count? } - maximum number of images to return (default: 5); count is an alias for limit
  - Returns: [{ originalUrl }, ...]

  search.research(topic, options?): { output, status, costDollars? }
  - Deep research
  - options: { stream? } - streams progress (default: true)
  Returns .output -> the result of the research

module: index.ts
