name: agents
description: |
  Manage and orchestrate agents and sub-agents.
  
  Methods:
  - agents.call(name, request): Call any agent/sub-agent. Uses the same pipeline as user messages.
  - agents.subAgent(name, config): Create session-exclusive sub-agent (copy of caller with additive prompt + model override)
  - agents.newAgent(prompt): Create new permanent agent via Gemini CLI
  - agents.list(): List all available agents with descriptions

module: index.ts
