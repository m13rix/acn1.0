name: strategy
description: |
  Persistent strategy system with two layers:
  1. Route exploration for action-branch strategy design.
  2. World-branch path graphs for probability/utility analysis.

  Core namespaces:
  - strategy.strategies.create(name, description?)
  - strategy.strategies.list()
  - strategy.strategies.get(strategyId)
  - strategy.strategies.remove(strategyId)

  Route exploration:
  - strategy.routes.create(strategyId, { name, parentRouteId?, depth?, rootWorkspace?, theme?, category?, summary?, slug?, note?, rank? })
    Use `depth` only for a root/start route with no parent. Use `rootWorkspace: true` for the conceptual root route whose folder is `strategy_workspace` and whose intake is `strategy_workspace/INTAKE.md`.
  - strategy.routes.createBatch(strategyId, { parentRouteId?, depth?, theme?, category?, routes: [...] })
  - strategy.routes.list(strategyId, { parentRouteId?, depth?, decision? }?)
  - strategy.routes.get(strategyId, routeId)
  - strategy.routes.update(strategyId, routeId, patch)
  - strategy.routes.keep(strategyId, routeId, { reason, evidence?, confidence?, rank? })
  - strategy.routes.kill(strategyId, routeId, { reason, evidence?, confidence?, rank? })
  - strategy.routes.reopen(strategyId, routeId, reason?)
  - strategy.routes.markSubroutesGenerated(strategyId, routeId, { note? })
  - strategy.routes.listPendingExpansion(strategyId, depth?)
  - strategy.routes.remove(strategyId, routeId)

  Depth cycle:
  - strategy.cycle.get(strategyId)
  - strategy.cycle.configure(strategyId, { maxDepth?, currentDepth?, status? })
  - strategy.cycle.depthSummary(strategyId, depth?)
  - strategy.cycle.getExpansionParents(strategyId, targetDepth?)
  - strategy.cycle.canAdvance(strategyId)
  - strategy.cycle.advance(strategyId)

  Automatic recursive route iteration:
  - strategy.iteration.begin(strategyId, { startDepth?, starterDepth?, agentDirectory?, sandboxDirectory?, maxRoutesPerDepth? })
    Launches the base strategist iteration worker automatically for pending non-killed routes at each depth, normally one route per depth. In agent actions, agentDirectory defaults to TELOS_AGENT_DIR and sandboxDirectory defaults to SANDBOX_DIR.

  - strategy.paths.create(strategyId, { name, description?, rootName? })
  - strategy.paths.list(strategyId)
  - strategy.paths.get(strategyId, pathId)
  - strategy.paths.remove(strategyId, pathId)
  - strategy.paths.validate(strategyId, pathId)

  - strategy.nodes.add(strategyId, pathId, { name, kind?, note? })
  - strategy.nodes.list(strategyId, pathId)
  - strategy.nodes.update(strategyId, pathId, nodeId, patch)
  - strategy.nodes.remove(strategyId, pathId, nodeId)

  - strategy.events.add(strategyId, pathId, { fromNodeId, toNodeId, name, probability, stateDelta, reason? })
  - strategy.events.list(strategyId, pathId)
  - strategy.events.update(strategyId, pathId, eventId, patch)
  - strategy.events.remove(strategyId, pathId, eventId)

  Analysis:
  - strategy.analysis.analyzePath(strategyId, pathId, { maxSteps })
  - strategy.analysis.probabilityToReachGoal(strategyId, pathId, maxSteps)
  - strategy.analysis.expectedStepsToGoal(strategyId, pathId, maxSteps)
  - strategy.analysis.expectedStateDelta(strategyId, pathId, maxSteps)
  - strategy.analysis.hittingTimeDistribution(strategyId, pathId, maxSteps)
  - strategy.analysis.distributionAtStep(strategyId, pathId, step)

  Divergence:
  - strategy.divergence.get(strategyId)
  - strategy.divergence.set(strategyId, { x, y })

  Convenience aliases:
  - strategy.createStrategy(...)
  - strategy.createProject(...)
  - strategy.createPath(...)
  - strategy.addNode(...)
  - strategy.addEvent(...)
  - strategy.connectNodes(...)
  - strategy.analyzePath(...)
  - strategy.calculatePathUtility(...)
  - strategy.getDivergence(...)
  - strategy.setDivergence(...)
  - strategy.createRoute(...)
  - strategy.createRouteBatch(...)
  - strategy.listRoutes(...)
  - strategy.getRoute(...)
  - strategy.keepRoute(...)
  - strategy.killRoute(...)
  - strategy.reopenRoute(...)
  - strategy.markRouteSubroutesGenerated(...)
  - strategy.listPendingRouteExpansion(...)
  - strategy.getCycle(...)
  - strategy.configureCycle(...)
  - strategy.advanceCycle(...)
  - strategy.beginIteration(...)
  - strategy.beginIterating(...)

  Modeling guidance for agents:
  - Use `routes` for action branching: broad family -> subfamily -> concrete tactic.
  - Every sibling set should share one `theme` and one `category` question.
  - At root depth for a resource-acquisition task, prefer broad acquisition families before tactics.
  - Use `paths/nodes/events` only for world branching: what the environment might do to one candidate route.
  - Each node should represent a discrete world state or progress band.
  - Each outgoing event set from a non-terminal node must sum to probability 1.
  - For accumulation goals, discretize progress into bands or loop states instead of trying to put all math into one edge.
  - For evaluation, use:
    - `probabilityReachGoal` for success odds
    - `expectedStepsToGoal` for speed
    - `expectedStateDelta` / `calculatePathUtility` for scalar payoff
  - If one step represents a fixed time chunk, then `expectedStepsToGoal * chunkDuration` gives expected time to goal.
  - Use the path layer for evidence, not vibes: model good events, bad events, dead ends, and retries explicitly.

module: index.ts
