name: memory
description: |
  Unified agent memory.

  Public API:
  - `memory.add(text, options?)`
    options:
    {
      retrievalHints?: string[],
      exclusive?: boolean
    }
    Returns:
    {
      queued: true,
      id: string,
      etaSeconds: number
    }

  - `memory.search(query, options?)`
    options:
    {
      mode?: "auto" | "top-k",
      count?: number,
      phraseWeighting?: "llm" | "embedding"
    }
    Returns:
    string

  - `memory.notes.list(input?)`
  - `memory.notes.find(query, input?)`
  - `memory.notes.create(title, text)`
  - `memory.notes.createList(title, items?)`

  `memory.notes.*` returns note handle objects with methods:
  - `get()`, `put(text)`, `append(text)`, `patch(search, replace)`, `remove()`
  - `archive(archived?)`, `pin(pinned?)`, `restore()`
  - `itemAdd(text, checked?)`, `itemCheck(item, checked?)`, `itemRemove(item)`
module: index.ts
