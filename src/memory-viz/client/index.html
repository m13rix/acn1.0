<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACN Core Memory</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="universe"></div>
    
    <div class="hud">
        <header>
            <h1>ACN MEMORY CORE</h1>
            <div class="stats">
                <span id="fact-count">0 FACTS</span>
                <span class="separator">|</span>
                <span id="link-count">0 LINKS</span>
            </div>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>Local Filter</label>
                <input type="text" id="search-input" placeholder="Filter nodes on graph...">
            </div>
            <div class="control-group">
                <label>Semantic Search</label>
                <input type="text" id="semantic-query" placeholder="Why did X happen?">
                <button id="run-search">Run memory.search</button>
                <div id="search-status" class="status-text"></div>
                <pre id="search-results" class="search-results"></pre>
            </div>
            <div class="control-group">
                <label>Simulation</label>
                <button id="toggle-sim">Pause</button>
            </div>
             <div class="control-group">
                <label>Visuals</label>
                <label class="toggle">
                    <input type="checkbox" id="show-labels" checked>
                    <span>Labels</span>
                </label>
            </div>
            <div class="control-group">
                <label>Import Document (.md/.txt)</label>
                <input type="file" id="doc-file" accept=".md,.txt,text/markdown,text/plain">
                <button id="import-doc">Add Doc</button>
                <div id="import-status" class="status-text"></div>
            </div>
        </div>
    </div>

    <div id="tooltip" class="tooltip hidden"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
